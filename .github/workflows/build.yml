name: build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26

      - name: Download Go modules
        run: go mod tidy

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test ./...
